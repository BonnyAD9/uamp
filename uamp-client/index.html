<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="assets/svg/icon.svg">
    <title>uamp</title>
</head>

<body>
    <div class="wrapper">
        <section class="menu">
            <div class="logo">
                <img src="assets/svg/icon.svg" alt="uamp logo">
                <h1>Uamp</h1>
            </div>

            <nav>
                <p class="active nosel grad-hover" data-screen="library">
                    Library
                </p>
                <p class="nosel grad-hover" data-screen="albums">Albums</p>
                <p class="nosel grad-hover" data-screen="artists">Artists</p>
                <p class="nosel grad-hover" data-screen="playlist">Playlist</p>
                <div class="spacer"></div>
                <p class="nosel grad-hover" data-screen="settings">Settings</p>
            </nav>
        </section>

        <section id="library" class="screen active">
            <screen-header
                title="Library"
                oninput="app.searchLibrary(event)"
            ></screen-header>
            <div class="screen-wrapper"></div>
        </section>

        <section id="albums" class="screen">
            <screen-header
                title="Albums"
                oninput="app.searchAlbums(event)"
            ></screen-header>
            <div class="screen-wrapper">
                <div
                    class="list with-album-context"
                    onclick="app.albumClick(event)"
                ></div>
            </div>
        </section>

        <section id="album-detail" class="screen">
            <!-- <img class="backdrop" src="assets/svg/img_placeholder.svg"
                alt="album cover" /> -->
            <div class="screen-wrapper album-detail-wrapper">
                <div class="info">
                    <img src="assets/svg/img_placeholder.svg" alt="album cover" />
                    <div class="details">
                        <h2 class="name"></h2>
                        <p class="artist"></p>
                        <span class="other"></span>
                    </div>
                </div>
            </div>
        </section>

        <section id="artists" class="screen">
            <screen-header
                title="Artists"
                oninput="app.searchArtists(event)"
            ></screen-header>
            <div class="screen-wrapper">
                <table class="songs with-artist-context with-album-context">
                    <colgroup>
                        <col style="width: 0%">
                        <col style="width: 50%">
                        <col style="width: 50%">
                    </colgroup>
                    <tbody onclick="app.artistClick(event)">
                    </tbody>
                </table>
            </div>
        </section>

        <section id="artist-detail" class="screen">
            <div class="screen-wrapper">
                <div class="info">
                    <div class="details">
                        <h2 class="name"></h2>
                        <p class="other"></p>
                    </div>
                </div>

                <h3>Albums</h3>
                <div
                    class="list with-album-context"
                    onclick="app.albumArtistClick(event)"
                ></div>

                <h3>Songs</h3>
            </div>
        </section>

        <section id="playlist" class="screen">
            <screen-header title="Playlist">
                <div class="tabs">
                    <div class="tabs-wrapper">
                        <button
                            id="playingPlaylist"
                            class="tab active"
                            onclick="app.setPlaylistTab(0)"
                        >Playing</button>
                    </div>
                    <div class="playlist-controls">
                        <img
                            src="assets/svg/push.svg"
                            alt="push playlist"
                            title="Push empty playlist"
                            onclick="apiCtrl('push=none')"
                        />
                        <img
                            src="assets/svg/pop.svg"
                            alt="push playlist"
                            title="Pops current playlist"
                            onclick="apiCtrl('pop')"
                        />
                    </div>
                </div>
            </screen-header>

            <div class="screen-wrapper playlist-wrapper"></div>
        </section>

        <section id="settings" class="screen">
            <screen-header title="Settings">
                <div class="tabs">
                    <div class="tabs-wrapper">
                        <button
                            class="tab active"
                            onclick="Config.showPage(0)"
                        >Appearance</button>
                    </div>
                </div>
            </screen-header>
            <div class="screen-wrapper settings-wrapper">
                <div class="settings-content active" id="appearanceSettings">
                </div>
            </div>
        </section>
    </div>

    <section class="bar floating">
        <img
            class="back-arrow"
            src="assets/svg/point_up.svg"
            onclick="toggleBar()"
            alt="back arrow"
        />

        <div class="bar-wrapper">
            <div class="info" onclick="toggleBar()">
                <div class="info-pic">
                    <img
                        src="assets/svg/img_placeholder.svg"
                        alt="song cover"
                    />
                </div>
                <div class="title">
                    <h3 class="ellipsis">Not Playing...</h3>
                    <h4 class="ellipsis">
                        <span id="bar-artist" class="ellipsis"></span> •
                        <span id="bar-album" class="ellipsis"></span>
                    </h4>
                </div>
            </div>

            <div class="slider-timestamp">
                <span id="timestamp-cur">--:--</span>
                <span id="timestamp-total">--:--</span>

            </div>

            <input
                value="0"
                type="range"
                min="0"
                max="100"
                step="any"
                id="progressBar"
                autocomplete="off"
            >

            <div class="controls">
                <img
                    class="control"
                    src="assets/svg/previous.svg"
                    onclick="apiCtrl('ps')"
                    id="prev"
                >

                <svg-icon
                    src="assets/svg/play_pause.svg"
                    class="control"
                    id="play"
                    onclick="apiCtrl('pp')"
                ></svg-icon>

                <img
                    class="control"
                    src="assets/svg/next.svg"
                    onclick="apiCtrl('ns')"
                    id="next"
                >
            </div>

            <div class="volume">
                <img
                    class="control"
                    src="assets/svg/volume_1.svg"
                    onclick="apiCtrl('mute')"
                >
                <p id="volumeValue">69</p>
                <input
                    type="range"
                    min="0"
                    max="100"
                    id="volumeSlider"
                    autocomplete="off"
                >
            </div>
        </div>

        <div class="playlist">
            <div
                class="songs"
                onclick="app.barPlaylistClick(event)"
            >
                <div class="spacer spacer-top"></div>
                <div class="spacer spacer-bottom"></div>
            </div>
        </div>

        <img class="backdrop" src="assets/svg/img_placeholder.svg" />
    </section>

    <template id="songs-template">
        <table class="songs">
            <colgroup>
                <col class="col-img">
                <col class="col-ta">
                <col class="col-ay">
                <col class="col-lg">
                <col class="col-td">
            </colgroup>
            <thead>
                <tr>
                    <th></th>
                    <th>
                        <span data-sort="title">Title</span> /
                        <span data-sort="artists">Artist</span>
                    </th>
                    <th>
                        <span data-sort="album">Album</span> /
                        <span data-sort="year">Year</span>
                    </th>
                    <th>
                        <span data-sort="length">Length</span> /
                        <span data-sort="genres">Genre</span>
                    </th>
                    <th>
                        <span data-sort="track">T</span> /
                        <span data-sort="disc">D</span>
                    </th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </template>

    <template id="songs-headerless-template">
        <table class="songs">
            <colgroup>
                <col class="col-img">
                <col class="col-ta">
                <col class="col-ay">
                <col class="col-lg">
                <col class="col-td">
            </colgroup>
            <tbody></tbody>
        </table>
    </template>

    <template id="song-template">
        <tr class="grad-hover">
            <td class="cover">
                <img
                    src="assets/svg/img_placeholder.svg"
                    alt="song cover"
                    loading="lazy"
                />
            </td>
            <td>
                <p class="title ellipsis"></p>
                <span class="author ellipsis"><span>
            </td>
            <td>
                <p class="album ellipsis"></p>
                <span class="year ellipsis"></span>
            </td>
            <td>
                <p class="length ellipsis"></p>
                <span class="genre ellipsis"><span>
            </td>
            <td>
                <p class="track ellipsis"></p>
                <span class="disc ellipsis"><span>
            </td>
        </tr>
    </template>

    <template id="album-template">
        <div class="card">
            <div class="card-inner">
                <div class="glow"></div>
                <div class="card-pic">
                    <img src="assets/svg/img_placeholder.svg" alt="album cover" />
                </div>
                <div class="details">
                    <p class="name ellipsis"></p>
                    <span class="artist ellipsis"></span>
                </div>
            </div>
        </div>
    </template>

    <template id="artist-template">
        <tr class="grad-hover">
            <td>
                <p class="artist ellipsis"></p>
                <span class="other ellipsis"><span>
            </td>
            <td>
                <div class="albums-preview"></div>
            </td>
        </tr>
    </template>

    <template id="bar-song-template">
        <div class="item grad-hover">
            <p class="ellipsis">
                <span class="id"></span>. <span class="title"></span> •
                <span class="artist"></span>
            </p>
        </div>
    </template>

    <template id="toggle-setting">
        <label class="switch-setting setting">
            <div class="switch">
                <input type="checkbox" /> <span class="slider"></span>
            </div>
            <div class="text">
                <p class="label"></p> <span class="description"></span>
            </div>
        </label>
    </template>

    <template id="select-setting">
        <label class="select-setting setting">
            <div class="text">
                <p class="label"></p> <span class="description"></span>
            </div>
            <select></select>
        </label>
    </template>

    <template id="list-setting">
        <label class="list-setting setting">
            <div class="text">
                <p class="label"></p> <span class="description"></span>
            </div>
            <div class="items">
                <div class="item input-item">
                    <input class="form-input" type="text" />
                </div>
            </div>
        </label>
    </template>

    <template id="list-item-setting">
        <div class="item">
            <img src="assets/svg/trash.svg" alt="trash" /><p></p>
        </div>
    </template>

    <template id="input-setting">
        <label class="input-setting setting">
            <div class="text">
                <p class="label"></p> <span class="description"></span>
            </div>
            <input class="form-input" type="text" />
        </label>
    </template>

    <template id="color-setting">
        <label class="color-setting setting">
            <input type="color" id="themeColor" />
            <div class="text">
                <p class="label"></p> <span class="description"></span>
            </div>
        </label>
    </template>

    <template id="screen-header">
        <div class="header">
            <div class="header-row">
                <h1></h1>
                <div class="filler"></div>
            </div>
        </div>
    </template>

    <template id="search-input">
        <label class="search-wrapper grad-hover">
            <input
                class="form-input"
                type="search"
                placeholder="Search..."
            />
            <button type="button">X</button>
        </label>
    </template>
</body>

<script src="ui/color-thief.js"></script>
<script type="module" src="events.js"></script>

</html>
